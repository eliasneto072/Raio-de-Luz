# Nginx — Raio de Luz (frontend)
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressão (deixa o site mais rápido)
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;

    # SPA: qualquer rota desconhecida cai no index.html (React Router cuida)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Encaminha chamadas /api para o backend
    # (o nome "backend" é o serviço no docker-compose)
    location /api/ {
        proxy_pass http://backend:3333/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache de assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
